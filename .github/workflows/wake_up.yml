name: Wake Up M-Lab Apps

on:
  schedule:
    # 6時間おきに実行（1日4回巡回）
    - cron: '0 */6 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  wake-up-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # npmを初期化し、ライブラリをインストール
          npm init -y
          npm install playwright
          npx playwright install-deps
          npx playwright install chromium

      - name: Run Wake Up Script
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            
            // 記憶した2つのURL
            const apps = [
              'https://english-ruby-app-5cbmsbsnyfjzf7fydhusza.streamlit.app/', 
              'https://english-ruby-app-appgr9gzfsoxqjw9ngdeeqb.streamlit.app/'
            ];

            for (const url of apps) {
              console.log('--- Visiting: ' + url + ' ---');
              try {
                // タイムアウトを60秒に設定
                await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                await page.waitForTimeout(10000); // 描画まで少し待機
                
                // 'Wake up' ボタンを探してクリック
                const button = page.getByRole('button', { name: /Wake up/i });
                if (await button.isVisible()) {
                  console.log('Result: App is sleeping. Clicking Wake up button...');
                  await button.click();
                  await page.waitForTimeout(20000); // 起動処理待ち
                  console.log('Result: Wake up signal sent.');
                } else {
                  console.log('Result: App is already awake.');
                }
              } catch (error) {
                console.error('Error visiting ' + url + ': ' + error.message);
              }
            }
            await browser.close();
          })();
          "
