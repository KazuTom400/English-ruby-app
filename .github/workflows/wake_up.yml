name: Wake Up M-Lab Apps

on:
  schedule:
    # 6時間おきに実行
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Node.js 24への強制移行を先取りする設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wake-up-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # バージョンを 24 に引き上げ
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install-deps
          npx playwright install chromium

      - name: Run Wake Up Script
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            
            const apps = [
              'https://english-ruby-app-5cbmsbsnyfjzf7fydhusza.streamlit.app/', 
              'https://english-ruby-app-appgr9gzfsoxqjw9ngdeeqb.streamlit.app/'
            ];

            for (const url of apps) {
              console.log('--- Visiting: ' + url + ' ---');
              try {
                await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                await page.waitForTimeout(10000);
                
                const button = page.getByRole('button', { name: /Wake up/i });
                if (await button.isVisible()) {
                  console.log('Result: App is sleeping. Clicking Wake up button...');
                  await button.click();
                  await page.waitForTimeout(20000);
                  console.log('Result: Wake up signal sent.');
                } else {
                  console.log('Result: App is already awake.');
                }
              } catch (error) {
                console.error('Error visiting ' + url + ': ' + error.message);
              }
            }
            await browser.close();
          })();
          "
